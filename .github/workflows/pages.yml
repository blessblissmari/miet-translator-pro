name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint || true
      - run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_OPENROUTER_KEY_1: ${{ secrets.OPENROUTER_KEY_1 }}
          VITE_OPENROUTER_KEY_2: ${{ secrets.OPENROUTER_KEY_2 }}
          VITE_OPENROUTER_KEY_3: ${{ secrets.OPENROUTER_KEY_3 }}
          VITE_OPENROUTER_KEY_4: ${{ secrets.OPENROUTER_KEY_4 }}
          VITE_OPENROUTER_KEY_5: ${{ secrets.OPENROUTER_KEY_5 }}
          VITE_OPENROUTER_KEY_6: ${{ secrets.OPENROUTER_KEY_6 }}
          VITE_OPENROUTER_KEY_7: ${{ secrets.OPENROUTER_KEY_7 }}
          VITE_MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}
        run: npm run build
      - name: Add 404 fallback (SPA routing)
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  e2e:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build for e2e
        run: npm run build
      - name: Run Playwright tests
        run: npm run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
